[SYSTEM]
timezone = Asia/Seoul
log_name = workflow_engine
log_level = info
log_format = %(asctime)s [%(process)d] [%(levelname)-5s] %(module)s.%(funcName)s() L%(lineno)d:: %(message)s
log_dir = /Users/hanati/workspace/agent/logs
